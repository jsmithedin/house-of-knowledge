models:
  - nova-lite    # -> app.config.NOVA_LITE_MODEL_ID = "amazon.nova-lite-v1:0"
  - haiku-4.5   # -> app.config.HAIKU_MODEL_ID = "eu.anthropic.claude-haiku-4-5-20251001-v1:0"
                 # Confirmed 2026-07-21: the bare on-demand ID is rejected by Bedrock
                 # ("on-demand throughput isn't supported") when calling Converse with
                 # tools (agentic runner). Re-pinned to the eu. cross-region inference
                 # profile ID, which has its own MODEL_PRICING entry in app/config.py.
k: 5
# Judge model: outside both evaluated families (not Amazon, not Anthropic) to avoid self-preference bias.
# Mistral Large: neutral family. Confirmed 2026-07-01 that eu-west-2 only offers
# mistral.mistral-large-2402-v1:0 on-demand — the newer 2407 is not available in
# region and there are no Mistral inference profiles here. So the judge is Large
# 2402 (the original Mistral Large), invoked with the bare on-demand model ID.
#   aws bedrock list-foundation-models --region eu-west-2 --query "modelSummaries[?contains(modelId,'mistral-large')].modelId"
judge_model: mistral.mistral-large-2402-v1:0
faithfulness_threshold: 1.0
